# Template rclone pour Cloudflare R2
# Copier dans ~/.config/rclone/rclone.conf
# Remplacer les valeurs __XXX__ par les vraies valeurs depuis le dashboard Cloudflare
#
# Obtenir les credentials :
#   1. https://dash.cloudflare.com → R2 Object Storage
#   2. "Manage R2 API Tokens" → Create API Token
#   3. Copier Access Key ID et Secret Access Key
#   4. Account ID visible dans l'URL : https://dash.cloudflare.com/<ACCOUNT_ID>/r2

[r2]
type = s3
provider = Cloudflare
access_key_id = __R2_ACCESS_KEY_ID__
secret_access_key = __R2_SECRET_ACCESS_KEY__
endpoint = https://__CLOUDFLARE_ACCOUNT_ID__.r2.cloudflarestorage.com
acl = private
no_check_bucket = true

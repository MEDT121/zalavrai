# SchoolSafe — Nginx reverse proxy pour PocketBase
# Remplacer __DOMAIN__ par votre domaine (fait automatiquement par setup.sh)

# Limite de débit — protection DDoS
limit_req_zone $binary_remote_addr zone=pb_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=pb_auth:10m rate=5r/m;

server {
    listen 80;
    server_name __DOMAIN__;
    # Certbot ajoutera la redirection HTTPS ici automatiquement
}

server {
    listen 443 ssl http2;
    server_name __DOMAIN__;

    # SSL (géré par Certbot — ne pas modifier manuellement)
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # CORS pour SchoolSafe (index.html servi depuis n'importe où)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, pb-client-name, pb-client-version" always;

    # Taille max upload (photos élèves, logos)
    client_max_body_size 20M;

    # ── PocketBase API ──────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=pb_api burst=50 nodelay;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
        proxy_buffering    off;
    }

    # ── Auth — rate limit strict ────────────────────────────────────────────
    location ~ ^/api/collections/users/auth-with-password {
        limit_req zone=pb_auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── PocketBase Admin UI ─────────────────────────────────────────────────
    location /_/ {
        # Restreindre l'accès admin à certaines IPs en production
        # allow 1.2.3.4;    # votre IP fixe
        # deny all;
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Fichiers statiques PocketBase (photos élèves, logos) ───────────────
    location /pb_public/ {
        proxy_pass       http://127.0.0.1:8090;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8090/api/health;
        access_log off;
    }

    # Bloquer accès fichiers sensibles
    location ~ /\. { deny all; }
}

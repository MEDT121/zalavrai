<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SchoolSafe — Connexion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%)}
.bg-dots{position:fixed;inset:0;z-index:1;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.bg-glow{position:fixed;bottom:-10%;left:-5%;width:55%;height:75%;z-index:1;background:radial-gradient(ellipse,rgba(79,172,254,.1) 0%,transparent 68%);pointer-events:none}
#stage{position:fixed;inset:0;z-index:10;overflow:hidden}

/* Girl puppet */
#girlWrap{position:absolute;bottom:0;left:0;z-index:22;pointer-events:none}
#girlSVG{position:absolute;bottom:0;left:0;width:100%;height:100%;overflow:visible}

/* Walk cycle */
@keyframes legL{0%,100%{transform:rotate(24deg)}50%{transform:rotate(-24deg)}}
@keyframes legR{0%,100%{transform:rotate(-24deg)}50%{transform:rotate(24deg)}}
@keyframes armLw{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
@keyframes armRw{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-18deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Wave */
@keyframes wave{
  0%  {transform:rotate(-10deg) translateX(0)}
  20% {transform:rotate(-78deg) translateX(12px)}
  40% {transform:rotate(-42deg) translateX(5px)}
  60% {transform:rotate(-82deg) translateX(14px)}
  80% {transform:rotate(-48deg) translateX(7px)}
  100%{transform:rotate(-10deg) translateX(0)}
}

#gBody{transform-origin:100px 220px}
#legLg{transform-origin:86px 290px}
#legRg{transform-origin:114px 290px}
#armLg{transform-origin:68px 158px}
#armRg{transform-origin:132px 158px}

.walking #gBody{animation:bob .52s ease-in-out infinite}
.walking #legLg{animation:legL .52s ease-in-out infinite}
.walking #legRg{animation:legR .52s ease-in-out infinite}
.walking #armLg{animation:armLw .52s ease-in-out infinite}
.walking #armRg{animation:armRw .52s ease-in-out infinite}

.waving #armRg{animation:wave .55s ease-in-out infinite !important;transform-origin:132px 158px}
.waving #armLg,.waving #legLg,.waving #legRg,.waving #gBody{animation:none !important}

/* Login card */
#loginCard{
  position:absolute;z-index:20;
  width:min(320px,80vw);
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,.18);border-radius:22px;
  padding:28px 24px 24px;box-shadow:0 24px 60px rgba(0,0,0,.45);
}
.card-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.card-logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#4facfe,#00f2fe);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;box-shadow:0 6px 18px rgba(79,172,254,.4);flex-shrink:0}
.card-title{color:#fff;font-size:20px;font-weight:700;letter-spacing:-.2px}
.card-sub{text-align:center;color:rgba(255,255,255,.45);font-size:12px;margin-bottom:20px}
.form-group{margin-bottom:12px}
.form-label{display:block;color:rgba(255,255,255,.55);font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase}
.form-input{width:100%;height:46px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:11px;color:#fff;font-size:15px;padding:0 14px;outline:none;transition:border-color .2s,background .2s}
.form-input::placeholder{color:rgba(255,255,255,.22)}
.form-input:focus{border-color:rgba(79,172,254,.7);background:rgba(255,255,255,.12)}
.form-input.pin{letter-spacing:6px;font-size:18px;font-weight:700;text-align:center}
.hint{min-height:16px;font-size:11px;text-align:center;color:rgba(255,100,100,.8);margin:3px 0 7px}
.btn-login{width:100%;height:48px;border:none;border-radius:13px;cursor:pointer;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(79,172,254,.4);transition:transform .15s,box-shadow .15s}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(79,172,254,.5)}
.btn-login:active{transform:translateY(0)}
.card-foot{margin-top:14px;text-align:center;color:rgba(255,255,255,.25);font-size:11px}
</style>
</head>
<body>
<div class="bg"></div><div class="bg-dots"></div><div class="bg-glow"></div>

<div id="stage">

      <radialGradient id="fc" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#b07848"/><stop offset="100%" stop-color="#8a5830"/></radialGradient>
    </defs>
    <g id="gBody">

      <circle cx="100" cy="160" r="2.5" fill="white" opacity=".8"/>
      <circle cx="100" cy="174" r="2.5" fill="white" opacity=".8"/>
      <circle cx="100" cy="188" r="2.5" fill="white" opacity=".8"/>
      <rect x="90" y="108" width="20" height="34" rx="8" fill="url(#sk)"/>
      <ellipse cx="100" cy="74" rx="48" ry="50" fill="#160800"/>
      <circle cx="55" cy="50" r="24" fill="#1a0a00"/><circle cx="48" cy="38" r="17" fill="#240e00"/>
      <circle cx="145" cy="50" r="24" fill="#1a0a00"/><circle cx="152" cy="38" r="17" fill="#240e00"/>
      <circle cx="55" cy="36" r="5.5" fill="#9b30f0" opacity=".95"/>
      <circle cx="145" cy="36" r="5.5" fill="#9b30f0" opacity=".95"/>
      <ellipse cx="100" cy="78" rx="34" ry="37" fill="url(#fc)"/>
      <ellipse cx="87" cy="73" rx="7.5" ry="8" fill="white"/><ellipse cx="113" cy="73" rx="7.5" ry="8" fill="white"/>
      <circle cx="87" cy="74" r="5.2" fill="#3a200a"/><circle cx="113" cy="74" r="5.2" fill="#3a200a"/>

      <path d="M80 63 Q87 59 94 63" stroke="#200800" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M106 63 Q113 59 120 63" stroke="#200800" stroke-width="2.8" fill="none" stroke-linecap="round"/>

      <path d="M91 96 Q100 102 109 96" stroke="white" stroke-width="3.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="78" cy="88" rx="8" ry="5" fill="rgba(210,110,70,.2)"/>
      <ellipse cx="122" cy="88" rx="8" ry="5" fill="rgba(210,110,70,.2)"/>

      <line x1="73" y1="230" x2="69" y2="316" stroke="#2a4080" stroke-width="1.5"/>
      <line x1="88" y1="230" x2="86" y2="316" stroke="#2a4080" stroke-width="1.5"/>
      <line x1="100" y1="230" x2="100" y2="316" stroke="#2a4080" stroke-width="1.5"/>
      <line x1="112" y1="230" x2="114" y2="316" stroke="#2a4080" stroke-width="1.5"/>

      <rect x="46" y="314" width="108" height="5" rx="2" fill="#152040"/>
    </g>
    <g id="legLg">
      <rect x="72" y="290" width="22" height="108" rx="10" fill="url(#sk)"/>
      <rect x="71" y="368" width="24" height="32" rx="8" fill="white"/>
      <line x1="71" y1="378" x2="95" y2="378" stroke="#ddd" stroke-width="1"/>
      <line x1="71" y1="384" x2="95" y2="384" stroke="#ddd" stroke-width="1"/>
      <ellipse cx="83" cy="402" rx="24" ry="10" fill="#111"/>
      <rect x="62" y="395" width="26" height="14" rx="7" fill="#222"/>
    </g>
    <g id="legRg">
      <rect x="106" y="290" width="22" height="108" rx="10" fill="url(#sk)"/>
      <rect x="105" y="368" width="24" height="32" rx="8" fill="white"/>
      <line x1="105" y1="378" x2="129" y2="378" stroke="#ddd" stroke-width="1"/>
      <line x1="105" y1="384" x2="129" y2="384" stroke="#ddd" stroke-width="1"/>

  </div>

  <div id="loginCard">
    <div class="card-logo">
      <div class="card-logo-icon">S</div>
      <div class="card-title">SchoolSafe</div>
    </div>
    <div class="card-sub">Connexion sécurisée</div>
    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="loginName">Identifiant</label>
        <input class="form-input" id="loginName" type="text" placeholder="Nom ou matricule">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPin">Code PIN</label>
        <input class="form-input pin" id="loginPin" type="password" placeholder="••••" maxlength="8" inputmode="numeric">
      </div>
      <div class="hint" id="loginHint"></div>
      <button class="btn-login" type="submit" id="loginBtn">Se connecter</button>
    </form>
    <div class="card-foot">SchoolSafe v3.0 · Le Sage / The Wise School</div>
  </div>
</div>

<script>
(function(){
// Mini tween
var tw=[],raf=null;
var E={lin:function(t){return t},out:function(t){return 1-Math.pow(1-t,3)},out4:function(t){return 1-Math.pow(1-t,4)},in2:function(t){return t*t*t},sine:function(t){return -(Math.cos(Math.PI*t)-1)/2}};
var st={};
function gs(el){if(!el.__id)el.__id='i'+(Math.random()*1e9|0);if(!st[el.__id])st[el.__id]={x:0,y:0,r:0,op:1};return st[el.__id];}
function ap(el,s){el.style.transform='translateX('+s.x+'px) translateY('+s.y+'px) rotate('+s.r+'deg)';el.style.opacity=s.op;}
function tick(){var now=performance.now(),live=[];for(var i=0;i<tw.length;i++){var t=tw[i];if(now<t.s){live.push(t);continue;}var p=Math.min(1,(now-t.s)/t.d),ep=t.e(p);var s=gs(t.el);for(var k in t.to)s[k]=t.f[k]+(t.to[k]-t.f[k])*ep;ap(t.el,s);if(p<1)live.push(t);else if(t.cb)t.cb();}tw=live;if(tw.length)raf=requestAnimationFrame(tick);else raf=null;}
window.Tw={set:function(el,p){var s=gs(el);for(var k in p)s[k]=p[k];ap(el,s);},to:function(el,p,dur,e,delay,cb){var s=gs(el),f={};for(var k in p)f[k]=s[k];tw.push({el:el,to:p,f:f,d:dur*1000,e:E[e]||E.lin,s:performance.now()+(delay||0)*1000,cb:cb||null});if(!raf)raf=requestAnimationFrame(tick);}};

// Loop controller
var wrap=document.getElementById('girlWrap');
var card=document.getElementById('loginCard');
var sw=window.innerWidth,sh=window.innerHeight;
var GH=Math.min(sh*0.90,660),GW=Math.round(GH*(200/530));
var CW=Math.min(320,Math.round(sw*0.80));
var CXPOS=Math.round(sw*0.52);
if(CXPOS+CW>sw-8)CXPOS=sw-CW-8;
card.style.width=CW+'px';card.style.left=CXPOS+'px';card.style.top=Math.round(sh/2-180)+'px';
var OFF_L=-(GW+20),PAUSE_X=Math.round(CXPOS-GW-16),OFF_R=sw+20;
wrap.style.width=GW+'px';wrap.style.height=GH+'px';wrap.style.left=OFF_L+'px';
Tw.set(wrap,{x:0,y:0,r:0,op:1});
function cls(c){wrap.className=c;}
function loop(){
  cls('walking');
  Tw.to(wrap,{x:PAUSE_X-OFF_L},2.2,'out',0,function(){
    cls('waving');
    Tw.to(wrap,{y:-14},0.22,'out',0);Tw.to(wrap,{y:0},0.20,'out',0.22);
    setTimeout(function(){
      cls('walking');
      Tw.to(wrap,{x:OFF_R-OFF_L},1.8,'in2',0,function(){
        Tw.set(wrap,{x:0,y:0,r:0,op:0});
        Tw.to(wrap,{op:1},0.15,'lin',0.1);
        setTimeout(loop,150);
      });
    },1900);
  });
}
setTimeout(loop,300);
})();

function handleLogin(e){
  e.preventDefault();
  var name=document.getElementById('loginName').value.trim();
  var pin=document.getElementById('loginPin').value.trim();
  var hint=document.getElementById('loginHint');
  var btn=document.getElementById('loginBtn');
  if(!name){hint.textContent='Veuillez saisir votre identifiant';return;}
  if(!pin||pin.length<4){hint.textContent='Code PIN requis (4–8 chiffres)';return;}
  hint.textContent='';btn.textContent='Connexion…';btn.disabled=true;
  // TODO_LICENCE: retirer cette ligne quand la base de données centrale est configurée
  setTimeout(function(){
    if(name.toLowerCase()==='admin'&&pin==='6921056'){
      hint.style.color='rgba(79,172,254,.9)';hint.textContent='Bienvenue, Administrateur !';btn.textContent='✓ Connecté';
    }else{
      hint.style.color='rgba(255,100,100,.8)';hint.textContent='Identifiant ou code PIN incorrect.';btn.textContent='Se connecter';btn.disabled=false;
    }
  },900);
}
</script>
</body>
</html>
